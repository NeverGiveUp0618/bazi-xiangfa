<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>八字象义图谱｜手机版</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-app">
    <header class="topbar">
      <div class="brand-row">
        <div>
          <h1>八字象义</h1>
          <p id="topHint">手机学习版</p>
        </div>
        <a class="desktop-link" href="../desktop/">电脑版</a>
      </div>

      <label class="search-box">
        <span>查</span>
        <input id="globalSearch" type="search" placeholder="文书、财库、子午冲、母亲..." />
      </label>

      <div class="quick-row" id="quickRow"></div>
    </header>

    <main>
      <section class="view active" id="view-search" aria-label="查象义">
        <div class="section-head">
          <h2>查象义</h2>
          <button id="clearSearch" type="button">清空</button>
        </div>
        <div class="result-stack" id="searchResults"></div>
      </section>

      <section class="view" id="view-bazi" aria-label="排盘观察">
        <div class="section-head">
          <h2>排盘观察</h2>
          <button id="resetBazi" type="button">重置</button>
        </div>

        <div class="bazi-board">
          <div class="pillar-labels"><span>年</span><span>月</span><span>日</span><span>时</span></div>
          <div class="bazi-cells" id="baziCells"></div>
          <div class="char-picker" id="charPicker"></div>
          <div class="action-row">
            <button id="scanRelations" type="button">扫描关系</button>
            <button id="useBaziAsSearch" type="button">按此盘查询</button>
          </div>
        </div>

        <div class="evidence-list" id="relationEvidence"></div>
        <div class="result-stack" id="baziResults"></div>
      </section>

      <section class="view" id="view-study" aria-label="学习卡片">
        <div class="section-head">
          <h2>学习卡片</h2>
          <button id="nextCard" type="button">下一张</button>
        </div>
        <article class="study-card" id="studyCard"></article>
      </section>

      <section class="view" id="view-library" aria-label="体系">
        <div class="section-head">
          <h2>体系浏览</h2>
          <span id="libraryCount"></span>
        </div>
        <div class="system-tabs" id="systemTabs"></div>
        <div class="result-stack" id="libraryNodes"></div>
      </section>

      <section class="view" id="view-detail" aria-label="详情">
        <div class="section-head">
          <h2 id="detailTitle">详情</h2>
          <button id="backToPrevious" type="button">返回</button>
        </div>
        <article class="detail-card" id="detailCard"></article>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button class="active" type="button" data-view="search">查询</button>
      <button type="button" data-view="bazi">排盘</button>
      <button type="button" data-view="study">学习</button>
      <button type="button" data-view="library">体系</button>
    </nav>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
