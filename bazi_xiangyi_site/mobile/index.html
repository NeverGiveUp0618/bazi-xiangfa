<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f6f1e7" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#181512" media="(prefers-color-scheme: dark)" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <title>象义随身 · 八字象义手机版</title>
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="mobile-app">
    <div class="update-bar" id="updateBar">
      <span class="update-dot"></span>
      <span class="update-text">近期有更新</span>
      <span class="update-btn">点击刷新 ↻</span>
    </div>
    <header class="topbar">
      <div class="brand-row">
        <h1>象义随身</h1>
        <p id="topHint" class="top-hint">想到一个词，先查共象</p>
      </div>
    </header>

    <main class="app-main">
      <!-- 查询 -->
      <section class="view active" id="view-search">
        <div class="search-box">
          <input id="globalSearch" type="search" placeholder="输入象义词：文书 / 财库 / 子午冲 / 母亲" autocomplete="off" />
          <button id="clearSearch" type="button" aria-label="清空">✕</button>
        </div>
        <div id="quickRow" class="quick-row"></div>
        <div id="searchBody"></div>
      </section>

      <!-- 排盘 -->
      <section class="view" id="view-chart">
        <div class="section-head">
          <h2>点选八字 · 自动解盘</h2>
          <button id="resetBazi" type="button" class="ghost-btn">重置</button>
        </div>
        <div id="chartBook" class="chart-book"></div>
        <div id="baziGrid" class="bazi-grid"></div>
        <div id="luckGrid" class="luck-grid"></div>
        <div id="charPicker" class="char-picker"></div>
        <label class="quiz-toggle">
          <input type="checkbox" id="quizMode" />
          <span>验证模式：先自己断盘，再逐项揭晓对答案</span>
        </label>
        <div id="chartAnalysis" class="chart-analysis"></div>
      </section>

      <!-- 学习 -->
      <section class="view" id="view-study">
        <div id="studyMode" class="study-mode"></div>
        <div id="studyScope" class="scope-row"></div>
        <div id="chartStudyFilter" class="chart-study-filter"></div>
        <div id="studyStats" class="study-stats"></div>
        <div id="studyCard" class="study-zone"></div>
      </section>

      <!-- 象义树 -->
      <section class="view" id="view-tree">
        <div class="tree-wrap" id="treeWrap">
          <canvas id="treeCanvas"></canvas>
          <div class="tree-legend" id="treeLegend"></div>
          <div class="tree-tools">
            <button type="button" id="treeFit">全图</button>
            <button type="button" id="treeShuffle">重排</button>
          </div>
          <div class="tree-info" id="treeInfo"></div>
        </div>
      </section>

      <!-- 图鉴 -->
      <section class="view" id="view-library">
        <div id="systemTabs" class="scope-row"></div>
        <p id="systemDesc" class="system-desc"></p>
        <div id="libraryNodes" class="library-list"></div>
      </section>

      <!-- 详情 -->
      <section class="view" id="view-detail">
        <div class="detail-head">
          <button id="detailBack" type="button" class="ghost-btn">← 返回</button>
        </div>
        <article id="detailCard" class="detail-card"></article>
      </section>
    </main>

    <nav class="bottom-nav" aria-label="主导航">
      <button type="button" data-view="search" class="active"><strong>查</strong><span>查询</span></button>
      <button type="button" data-view="chart"><strong>盘</strong><span>排盘</span></button>
      <button type="button" data-view="study"><strong>学</strong><span>学习</span></button>
      <button type="button" data-view="tree"><strong>树</strong><span>象义树</span></button>
      <button type="button" data-view="library"><strong>库</strong><span>图鉴</span></button>
    </nav>
  </div>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
